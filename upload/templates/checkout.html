{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}
{% block content %}
<div class="wrap" style="max-width:560px">
    <h1 class="ptitle">Checkout</h1>
    <div class="card cp mb24">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Summary</h2>
        {% for item in cart %}<div class="flex ac jb mb4" style="font-size:13px"><span>{{ item.name }} × {{ item.qty }}</span><strong>£{{ '%.2f'|format(item.price * item.qty) }}</strong></div>{% endfor %}
        <div class="div"></div>
        <div class="flex ac jb"><strong>Total</strong><strong style="font-size:18px;color:var(--g)">£{{ '%.2f'|format(total) }}</strong></div>
    </div>
    <form method="POST"><div class="card cp">
        <h2 style="font-size:14px;font-weight:700;margin-bottom:12px">Delivery</h2>
        <div class="fg"><label class="fl2" for="sf">Delivery Date</label><input type="date" id="sf" name="scheduled_for" class="fi"><p class="fh">Optional</p></div>
        <div class="fg"><label class="fl2" for="dn">Notes</label><textarea id="dn" name="delivery_notes" class="fta" placeholder="e.g. Leave at back door"></textarea></div>
        <button type="submit" class="btn btn-p btn-bl">Place Order — £{{ '%.2f'|format(total) }}</button>
    </div></form>
</div>
{% endblock %}
