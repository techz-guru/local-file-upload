{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="auth"><div class="card"><div class="cp">
    <h1>Create your account</h1>
    <form method="POST">
        <div class="fg"><label class="fl2" for="full_name">Full Name</label><input type="text" id="full_name" name="full_name" class="fi" required></div>
        <div class="fg"><label class="fl2" for="role">I am a…</label><select id="role" name="role" class="fsel"><option value="buyer">Buyer (Customer)</option><option value="farmer">Producer (Farmer)</option></select></div>
        <div class="fg"><label class="fl2" for="email">Email</label><input type="email" id="email" name="email" class="fi" required></div>
        <div class="fg"><label class="fl2" for="password">Password</label><input type="password" id="password" name="password" class="fi" required minlength="6"><p class="fh">At least 6 characters</p></div>
        <div class="fg"><label class="fl2" for="password_confirm">Confirm Password</label><input type="password" id="password_confirm" name="password_confirm" class="fi" required></div>
        <button type="submit" class="btn btn-p btn-bl">Create Account</button>
    </form>
    <p class="auth-f">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div></div></div>
{% endblock %}
